<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: white;
      padding: 24px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .count {
      font-size: 13px;
      opacity: 0.75;
    }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filter-bar {
      display: flex;
      padding: 12px 20px;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-bar button {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #e2e8f0;
      background: white;
      font-size: 13px;
      cursor: pointer;
      color: #64748b;
      transition: all 0.15s;
    }

    .filter-bar button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    .list {
      padding: 8px 0;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      padding: 40px 0;
    }

    .item {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      gap: 12px;
      transition: background 0.15s;
    }

    .item:hover {
      background: #f8fafc;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #1e293b;
      transition: all 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .footer {
      padding: 14px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 13px;
      color: #94a3b8;
    }

    .clear-btn {
      font-size: 13px;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="count" id="count">0개 항목</div>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="아이템 추가..." maxlength="60">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('pending', this)">미완료</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"></div>

    <div class="footer">
      <span id="done-count">완료 0개</span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://uqratlgrjortniaxtfyw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxcmF0bGdyam9ydG5pYXh0Znl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTcwMjQsImV4cCI6MjA4OTIzMzAyNH0.a37nB0KXsiBIruMiN4jLSrlRQJPjbSpCHgf4sNWkfE8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let filter = 'all';

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const { data, error } = await supabase
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();
      if (error) { console.error(error); return; }
      items.unshift(data);
      render();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);
      if (error) { console.error(error); return; }
      item.checked = !item.checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) { console.error(error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.checked).map(i => i.id);
      if (doneIds.length === 0) return;
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .in('id', doneIds);
      if (error) { console.error(error); return; }
      items = items.filter(i => !i.checked);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const total = items.length;
      const done = items.filter(i => i.checked).length;

      document.getElementById('count').textContent = `${total}개 항목`;
      document.getElementById('done-count').textContent = `완료 ${done}개`;

      const visible = items.filter(i => {
        if (filter === 'pending') return !i.checked;
        if (filter === 'done') return i.checked;
        return true;
      });

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty">${filter === 'done' ? '완료된 항목이 없어요' : '항목을 추가해보세요!'}</div>`;
        return;
      }

      list.innerHTML = visible.map(item => `
        <div class="item ${item.checked ? 'checked' : ''}">
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem(${item.id})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem(${item.id})" title="삭제">×</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 전역 함수 노출 (onclick 핸들러용)
    window.addItem = addItem;
    window.toggleItem = toggleItem;
    window.deleteItem = deleteItem;
    window.clearDone = clearDone;
    window.setFilter = setFilter;

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
